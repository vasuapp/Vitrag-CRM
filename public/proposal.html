<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curated Property Shortlist | REALPro CRM</title>
  <!-- Outfit & Inter Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Tabler Icons CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- PWA Manifest & Service Worker -->
  <link rel="manifest" href="/manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
  
  <style>
    :root {
      --bg-dark: #070d14;
      --bg-panel: rgba(13, 22, 37, 0.65);
      --bg-card: rgba(255, 255, 255, 0.02);
      --gold: #dfb13c;
      --gold-l: #f9d67a;
      --gold-d: #a67c1e;
      --border: rgba(255, 255, 255, 0.06);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --green: #10b981;
      --radius: 16px;
      --radius-sm: 10px;
      --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 5% 10%, rgba(223, 177, 60, 0.08) 0%, transparent 45%),
        radial-gradient(circle at 95% 90%, rgba(30, 144, 255, 0.04) 0%, transparent 40%),
        linear-gradient(180deg, #070d14 0%, #03070c 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding: 30px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 0;
    }

    /* Branded Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 30px;
      box-shadow: 0 10px 35px -10px rgba(0,0,0,0.5);
    }

    .brand-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-title span {
      color: var(--gold-l);
    }

    .agent-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: rgba(223, 177, 60, 0.08);
      border: 1px solid rgba(223, 177, 60, 0.35);
      border-radius: 50px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--gold-l);
      letter-spacing: 0.3px;
    }

    .agent-badge i {
      color: var(--gold-l);
      font-size: 16px;
    }

    /* Intro Hero Panel */
    .intro-card {
      background: linear-gradient(135deg, rgba(16, 28, 48, 0.8), rgba(9, 15, 26, 0.95));
      border: 1px solid rgba(223, 177, 60, 0.2);
      border-radius: var(--radius);
      padding: 45px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.6),
                  inset 0 1px 1px rgba(255,255,255,0.1);
    }

    .intro-card::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -10%;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(223, 177, 60, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .intro-title {
      font-family: 'Outfit', sans-serif;
      font-size: 34px;
      font-weight: 800;
      color: var(--gold-l);
      margin-bottom: 18px;
      line-height: 1.25;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .intro-meta {
      font-size: 13.5px;
      color: var(--text-muted);
      margin-bottom: 25px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 18px;
    }

    .intro-meta span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .intro-meta strong {
      color: var(--text);
    }

    .intro-message {
      font-size: 15.5px;
      color: #e2e8f0;
      border-left: 3px solid var(--gold);
      padding-left: 20px;
      margin-top: 10px;
      line-height: 1.7;
    }

    /* Properties Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 30px;
      margin-bottom: 50px;
    }

    /* Property Card Layout */
    .prop-card {
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: var(--transition);
      box-shadow: 0 12px 35px -12px rgba(0,0,0,0.6);
      position: relative;
    }

    .prop-card:hover {
      transform: translateY(-6px);
      border-color: rgba(223, 177, 60, 0.4);
      box-shadow: 0 25px 45px -15px rgba(0,0,0,0.8),
                  0 0 25px rgba(223, 177, 60, 0.05);
    }

    .prop-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
      gap: 15px;
    }

    .prop-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.2px;
      line-height: 1.3;
    }

    .prop-price {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      color: var(--green);
      font-weight: 900;
      white-space: nowrap;
    }

    .prop-location {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    /* Tags container */
    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .tag-gold {
      background: rgba(223, 177, 60, 0.08);
      border-color: rgba(223, 177, 60, 0.4);
      color: var(--gold-l);
    }

    /* Custom 3-column Metadata */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin-bottom: 22px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
    }

    .meta-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }

    .meta-value {
      font-size: 12.5px;
      color: #fff;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Agent Comments section */
    .comments-box {
      background: rgba(223, 177, 60, 0.03);
      border-left: 3px solid var(--gold);
      padding: 14px 18px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 13.5px;
      color: #cbd5e1;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .comments-box strong {
      color: var(--gold-l);
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    /* CTA Actions */
    .cta-row {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .btn {
      flex: 1;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 700;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      border: none;
      font-family: 'Outfit', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-d), var(--gold));
      color: #050b13;
      box-shadow: 0 4px 15px rgba(223, 177, 60, 0.2);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--gold), var(--gold-l));
      box-shadow: 0 6px 20px rgba(223, 177, 60, 0.35);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }

    /* Loading Spinner */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 0;
      color: var(--text-muted);
    }

    .spinner {
      border: 3px solid rgba(223, 177, 60, 0.1);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border-left-color: var(--gold);
      animation: spin 1s linear infinite;
      margin-bottom: 18px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Dynamic Alerts / Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 10, 18, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: #0d1624;
      border: 1px solid rgba(223, 177, 60, 0.3);
      border-radius: var(--radius);
      padding: 40px 30px;
      max-width: 450px;
      width: 90%;
      text-align: center;
      transform: translateY(20px);
      transition: var(--transition);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-card i {
      font-size: 56px;
      color: var(--gold);
      margin-bottom: 20px;
      display: inline-block;
    }

    .modal-title {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .modal-desc {
      font-size: 14.5px;
      color: var(--text-muted);
      margin-bottom: 25px;
      line-height: 1.6;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 45px 0 20px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .footer a {
      color: var(--gold-l);
      text-decoration: none;
      font-weight: 700;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    .footer a:hover {
      border-color: var(--gold-l);
    }

    /* CSS Micro-Animations on load */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .header, .intro-card, .prop-card, .footer {
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .intro-card { animation-delay: 0.1s; }
    .grid { animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; animation-delay: 0.2s; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="brand-title"><i class="ti ti-building-skyscraper" style="color:var(--gold-l)"></i> REALPro <span>CRM</span></div>
      <div class="agent-badge"><i class="ti ti-shield-check"></i> Verified Advisor Pitch</div>
    </header>

    <!-- Main Content Area -->
    <div id="proposal-wrapper">
      <div class="loader">
        <div class="spinner"></div>
        <p>Loading your personalized properties portfolio...</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2026 REALPro CRM. Generated by Advisor <a href="tel:+919945403202">Vasu Jain</a>. All rights reserved.</p>
    </footer>
  </div>

  <!-- Interactive Alert Modal -->
  <div class="modal-overlay" id="alert-modal">
    <div class="modal-card">
      <i class="ti ti-circle-check"></i>
      <div class="modal-title" id="alert-title">Request Registered</div>
      <div class="modal-desc" id="alert-desc">We have received your preference. Your dedicated advisor Vasu Jain will connect shortly.</div>
      <button class="btn btn-primary" onclick="closeAlert()" style="margin: 0 auto; min-width: 120px;">Done</button>
    </div>
  </div>

  <script>
    const token = window.location.pathname.split('/').pop().split('?')[0];
    let proposalData = null;

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadBrandingSettings() {
      try {
        const res = await fetch('/api/system/settings');
        if (res.ok) {
          const settings = await res.json();
          const brandTitle = document.querySelector('.brand-title');
          if (brandTitle) {
            const logoHtml = settings.coBrandLogo ? `<img src="${settings.coBrandLogo}" style="max-height: 28px; border-radius: 4px; vertical-align: middle; object-fit: contain;">` : `<i class="ti ti-building-skyscraper" style="color:var(--gold-l)"></i>`;
            brandTitle.innerHTML = `${logoHtml} ${escapeHtml(settings.coBrandName || 'Subh Homes')}`;
          }
          const footer = document.querySelector('.footer');
          if (footer) {
            footer.innerHTML = `<p>© 2026 ${escapeHtml(settings.coBrandName || 'Subh Homes')}. Generated by Advisor <a href="tel:${settings.coPhone || ''}">${escapeHtml(settings.userName || 'Vasu Jain')}</a>. All rights reserved.</p>`;
          }
        }
      } catch (e) {
        console.error('Failed to load branding settings:', e);
      }
    }
    window.addEventListener('DOMContentLoaded', loadBrandingSettings);

    async function loadProposalDetails() {
      try {
        const response = await fetch(`/api/public/proposals/${token}`);
        if (!response.ok) {
          document.getElementById('proposal-wrapper').innerHTML = `
            <div class="intro-card" style="text-align:center; border-color:var(--red);">
              <h2 class="intro-title" style="color:#e74c3c;">⚠️ Proposal Portfolio Not Found</h2>
              <p style="color:var(--text-muted); margin-top:10px;">The secure token is either invalid, deleted, or has reached its expiration date.</p>
            </div>
          `;
          return;
        }

        const data = await response.json();
        proposalData = data;
        
        // Update document title dynamically
        document.title = `${data.proposal.title || 'Curated Portfolio'} | ${data.settings?.coBrandName || 'Subh Homes'}`;
        
        renderProposalUI(data);
      } catch (err) {
        console.error(err);
      }
    }

    function renderProposalUI(data) {
      const p = data.proposal;
      const properties = data.properties;

      let propertiesHTML = '';
      
      if (properties.length === 0) {
        propertiesHTML = `<div class="intro-card" style="text-align:center; grid-column: 1/-1;">No properties attached to this shortlist.</div>`;
      } else {
        propertiesHTML = properties.map(pr => {
          // Check typologies or status
          const isRental = (pr.property_type || '').toLowerCase().includes('rental') || (pr.price_raw || '').includes('/mo');
          const mandateBadge = pr.mandate_type === 'Exclusive' ? '<span class="tag tag-gold">👑 Exclusive</span>' : '';

          return `
            <div class="prop-card">
              <div>
                <div class="prop-header">
                  <h3 class="prop-title">${pr.society}</h3>
                  <div class="prop-price">${pr.price_raw}</div>
                </div>
                
                <div class="prop-location">
                  <i class="ti ti-map-pin"></i> ${pr.location} · <strong>${pr.property_type || 'Residential'}</strong>
                </div>

                <div class="tags">
                  ${mandateBadge}
                  <span class="tag">${pr.configuration || 'Config N/A'}</span>
                  <span class="tag">${isRental ? 'Lease Agreement' : 'Sale Outbound'}</span>
                  <span class="tag">${pr.possession || 'Immediate'}</span>
                </div>

                <!-- Curated Metadata Matrix -->
                <div class="meta-grid">
                  <div class="meta-item">
                    <span class="meta-label">📐 Area</span>
                    <span class="meta-value">${pr.area_sqft} Sqft</span>
                  </div>
                  <div class="meta-item">
                    <span class="meta-label">🛋️ Interiors</span>
                    <span class="meta-value">${pr.interiors || 'N/A'}</span>
                  </div>
                  <div class="meta-item">
                    <span class="meta-label">🚪 Facing</span>
                    <span class="meta-value">${pr.facing || 'East'}</span>
                  </div>
                </div>

                ${pr.agent_comments ? `
                  <div class="comments-box">
                    <strong>📋 Advisor Recommendations:</strong>
                    ${pr.agent_comments}
                  </div>
                ` : ''}
              </div>

              <!-- Call to Actions -->
              <div class="cta-row">
                <button class="btn btn-primary" onclick="respondToProposal('site_visit', ${pr.id}, '${pr.society}')">
                  <i class="ti ti-calendar-event"></i> Book Site Visit
                </button>
                <button class="btn btn-ghost" onclick="respondToProposal('interested', ${pr.id}, '${pr.society}')">
                  <i class="ti ti-thumb-up"></i> I'm Interested
                </button>
              </div>
            </div>
          `;
        }).join('');
      }

      const layout = `
        <!-- Hero Greetings Card -->
        <div class="intro-card">
          <h1 class="intro-title">${p.title || 'Exclusive Real Estate Proposal'}</h1>
          <div class="intro-meta">
            <span><i class="ti ti-user"></i> Client: <strong>${p.lead_name}</strong></span>
            <span><i class="ti ti-user-check"></i> Curator: <strong>${p.agent_name || 'Vasu Jain'}</strong></span>
            <span><i class="ti ti-calendar"></i> Dispatched: <strong>${new Date(p.created_at).toLocaleDateString()}</strong></span>
          </div>
          <div class="intro-message">
            ${p.intro_message || 'Please review the properties chosen below.'}
          </div>
        </div>

        <!-- Curated Property shortlists Title -->
        <h2 style="font-family:'Outfit', sans-serif; font-size:24px; font-weight:800; margin-bottom:20px; color:var(--text); letter-spacing:0.5px;">Curated Listings Grid</h2>

        <!-- Cards grid -->
        <div class="grid">
          ${propertiesHTML}
        </div>
      `;

      document.getElementById('proposal-wrapper').innerHTML = layout;
    }

    async function respondToProposal(responseType, propertyId, societyName) {
      try {
        const response = await fetch(`/api/public/proposals/${token}/respond`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ response_type: responseType, property_id: propertyId })
        });
        
        if (response.ok) {
          const actionText = responseType === 'site_visit' ? 'Site Visit Requested!' : 'Interest Expressed!';
          const advisor = proposalData && proposalData.settings ? proposalData.settings.userName : 'Vasu Jain';
          const descText = responseType === 'site_visit' 
            ? `Excellent choice! We have scheduled a priority callback to book a physical visit for <strong>${societyName}</strong>. ${escapeHtml(advisor)} will contact you shortly.`
            : `Fabulous! We have logged your preference for <strong>${societyName}</strong>. Our premium desk will contact you with floor plan layout options.`;

          document.getElementById('alert-title').innerText = actionText;
          document.getElementById('alert-desc').innerHTML = descText;
          document.getElementById('alert-modal').classList.add('active');
        }
      } catch (err) {
        console.error(err);
      }
    }

    function closeAlert() {
      document.getElementById('alert-modal').classList.remove('active');
    }

    // Load initial data
    loadProposalDetails();
  </script>
</body>
</html>
